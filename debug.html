<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تشخيص الاتصال - ZN Cash</title>
<style>
  body{background:#0A0505;color:#fff;font-family:-apple-system,Arial,sans-serif;padding:16px;margin:0;line-height:1.6}
  h2{color:#F0B429;font-size:18px}
  .box{background:#1A0E0E;border:1px solid #333;border-radius:12px;padding:14px;margin-bottom:14px}
  .ok{color:#4ade80;font-weight:bold}
  .err{color:#f87171;font-weight:bold}
  .lbl{color:#999;font-size:12px;margin-bottom:4px}
  pre{white-space:pre-wrap;word-break:break-word;background:#000;padding:10px;border-radius:8px;font-size:12px;color:#0f0;direction:ltr;text-align:left}
  button{background:#F0B429;color:#000;border:none;padding:12px 20px;border-radius:10px;font-weight:bold;font-size:15px;width:100%;margin-top:8px}
</style>
</head>
<body>
<h2>🔍 تشخيص الاتصال بالسيرفر</h2>
<div class="box">
  <div class="lbl">عنوان API المستهدف:</div>
  <pre id="target"></pre>
</div>
<button onclick="runTest()">▶ ابدأ الفحص</button>
<div id="result"></div>

<script>
var API_BASE='https://zncash.great-site.net'; // تأكد أنه نفس العنوان المستخدم في index.html
document.getElementById('target').textContent=API_BASE+'/auth_api.php';

function box(title,status,content){
  var d=document.createElement('div');
  d.className='box';
  d.innerHTML='<div class="lbl">'+title+'</div><div class="'+(status?'ok':'err')+'">'+(status?'✅ نجح':'❌ فشل')+'</div><pre>'+content+'</pre>';
  document.getElementById('result').appendChild(d);
}

function runTest(){
  document.getElementById('result').innerHTML='<div class="box">⏳ جاري الفحص...</div>';
  setTimeout(function(){document.getElementById('result').innerHTML=''},50);

  fetch(API_BASE+'/auth_api.php',{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:'login',email:'test_diagnostic@example.com',password:'test123456',token:''})
  }).then(function(r){
    return r.text().then(function(txt){
      var ok = r.status>0; // وصل رد من السيرفر (أي حالة)
      box('الاتصال بالسيرفر (Status: '+r.status+')', ok, txt||'(رد فارغ)');
      try{
        var j=JSON.parse(txt);
        box('استجابة API صالحة (JSON)', true, JSON.stringify(j,null,2));
        if(j.error && j.error.indexOf('غير موجود')>-1){
          box('النتيجة', true, '🎉 كل شيء يعمل بشكل صحيح! السيرفر وقاعدة البيانات وCORS كلها سليمة.\nالخطأ الذي رأيته سابقاً في التسجيل كان على الأغلب بيانات مدخلة خاطئة أو مشكلة أخرى غير الاتصال.');
        }
      }catch(e){
        box('تحليل الرد كـ JSON', false, 'الرد ليس JSON صالح — هذا يعني أن هناك خطأ PHP (Fatal Error) في السيرفر.\nالرد الخام:\n'+txt.slice(0,500));
      }
    });
  }).catch(function(err){
    box('الاتصال بالسيرفر', false,
      'فشل الاتصال تماماً!\n\nرسالة الخطأ: '+err.message+
      '\n\nالسبب الأرجح: مشكلة CORS — يعني أن هذه الصفحة (أو index.html) لا تُفتح من نفس النطاق المسجّل في ALLOWED_ORIGINS داخل config.php.\n\n'+
      'تحقق من:\n1) أن رابط الصفحة الحالية في المتصفح يطابق بالضبط ما وضعته في ALLOWED_ORIGINS\n2) أن config.php مرفوع فعلاً على InfinityFree\n3) أن لا يوجد خطأ إملائي في API_BASE'
    );
    box('رابط هذه الصفحة الحالي (Origin)', true, window.location.origin);
  });
}
</script>
</body>
</html>
